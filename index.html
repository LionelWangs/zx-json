<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>装修预算与采购看板</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- SheetJS & xlsx-js-style -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            /* Apple Dark Mode Colors & Materials */
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.45); /* More transparent for glass effect */
            --card-bg-hover: rgba(44, 44, 46, 0.65);
            --card-border: rgba(255, 255, 255, 0.06); /* Subtler border */
            --text-primary: #F5F5F7;
            --text-secondary: #86868B;
            --text-tertiary: #515154;
            --accent-blue: #0A84FF;
            --accent-blue-hover: #409CFF;
            --accent-green: #30D158; /* Apple refined green */
            --accent-orange: #FF9F0A;
            --accent-red: #FF453A;
            --accent-purple: #BF5AF2;
            --divider: rgba(255, 255, 255, 0.1);
            --divider-light: rgba(255, 255, 255, 0.05);
            
            /* Apple Materials Dark */
            --glass-blur: blur(40px) saturate(200%);
            --glass-bg: rgba(28, 28, 30, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            /* Apple Shadows Dark */
            --shadow-sm: 0 4px 14px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 10px 40px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 24px 80px rgba(0, 0, 0, 0.6);
            --shadow-float: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
            
            /* Apple Radius */
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            
            /* Apple Animations */
            --ease-spring: cubic-bezier(0.25, 0.8, 0.15, 1.15);
            --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
            --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Apple system fonts with fallback */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            padding-bottom: 80px;
            background-image: 
                radial-gradient(circle at 15% 0%, rgba(10, 132, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 0%, rgba(191, 90, 242, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 0%, rgba(28, 28, 30, 0.8) 0%, transparent 70%);
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 顶部毛玻璃导航 (Apple Navbar) */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
            transition: all 0.3s var(--ease-out);
        }

        header.scrolled {
            padding: 10px 40px;
            background: rgba(28, 28, 30, 0.85);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        header h1 {
            font-size: 21px;
            font-weight: 600;
            letter-spacing: -0.015em;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .header-actions-group {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border-radius: 980px;
            border: 1px solid var(--glass-border);
        }

        /* 苹果风格按钮 (Apple Buttons) */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 980px; /* Pill shape */
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.01em;
            cursor: pointer;
            border: none;
            transition: all 0.3s var(--ease-out);
            outline: none;
            text-decoration: none;
        }

        .btn:active {
            transform: scale(0.94);
            opacity: 0.8;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: #FFF;
            box-shadow: 0 2px 8px rgba(10, 132, 255, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .btn-primary:hover {
            background-color: var(--accent-blue-hover);
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: rgba(255,255,255,0.08);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .btn-outline:hover {
            background-color: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
            box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background-color: transparent;
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 50%;
        }

        .btn-ghost:hover {
            color: var(--text-primary);
            background-color: rgba(255,255,255,0.08);
        }
        
        .btn-danger {
            color: var(--text-secondary);
        }
        .btn-danger:hover {
            color: var(--accent-red);
            background-color: rgba(255, 69, 58, 0.15);
        }

        /* 布局容器 */
        .layout-wrapper {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 20px;
            gap: 32px;
            animation: fadeUpIn 0.8s var(--ease-out) forwards;
            align-items: flex-start;
        }

        .sidebar {
            width: 180px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: sticky;
            top: 80px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--text-secondary);
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s var(--ease-out);
            text-align: left;
            outline: none;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--card-bg);
            color: var(--accent-blue);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--glass-border);
        }

        .nav-item i {
            font-size: 20px;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeUpIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 工具栏 (Tools & Filters) */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            position: relative;
            z-index: 100;
        }

        .search-box {
            position: relative;
            width: 280px;
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 16px;
            transition: color 0.3s;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 36px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            background: rgba(255,255,255,0.08);
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s var(--ease-out);
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            background: rgba(255,255,255,0.12);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.2);
        }
        
        .search-input:focus + i {
            color: var(--accent-blue);
        }

        .filter-group {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border-radius: var(--radius-md);
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            border: none;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s var(--ease-out);
        }

        .filter-btn.active {
            background: rgba(255,255,255,0.15);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 统计卡片面板 (Apple Cards) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        /* 图表容器 (Charts) */
        .charts-container {
            margin-bottom: 32px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-xl);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s var(--ease-out);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .chart-card:hover {
            box-shadow: var(--shadow-md);
            background: var(--card-bg-hover);
        }

        .chart-header {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-body {
            position: relative;
            flex: 1;
            min-height: 250px;
            width: 100%;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(36, 36, 38, 0.6), rgba(28, 28, 30, 0.4));
            border: 1px solid var(--card-border);
            border-radius: var(--radius-xl);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            transition: all 0.4s var(--ease-out);
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s var(--ease-out);
            pointer-events: none;
        }

        .stat-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--shadow-md);
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .stat-card:hover::before { opacity: 1; }

        .stat-card .label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-card .label i {
            font-size: 16px;
            opacity: 0.8;
        }

        .stat-card .value {
            font-size: 34px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }

        /* 超预算卡片高亮样式 */
        .stat-card.over-budget { 
            background: rgba(255, 69, 58, 0.1);
            border-color: rgba(255, 69, 58, 0.3);
        }
        .stat-card.over-budget .value { color: var(--accent-red); }
        .stat-card.over-budget .label { color: var(--accent-red); opacity: 0.9; }
        
        .stat-card.positive .value { color: var(--accent-green); }
        .stat-card.positive .label { color: var(--accent-green); opacity: 0.9; }

        .column-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: rgba(44, 44, 46, 0.95); /* 更实一点的背景色避免透字 */
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 8px;
            box-shadow: var(--shadow-lg); /* 增加阴影增强层级感 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 140px;
        }

        .column-menu label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-primary);
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .column-menu label:hover {
            background: rgba(255,255,255,0.1);
        }

        .column-menu input[type="checkbox"] {
            accent-color: var(--accent-blue);
        }

        /* 数据表格容器 (Apple Table) */
        .table-container {
            background: rgba(28, 28, 30, 0.45);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            overflow-x: auto; /* 允许横向滚动以适应列宽调整 */
            overflow-y: hidden;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            transition: box-shadow 0.4s var(--ease-out);
            position: relative;
        }
        
        .table-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 20;
        }

        .table-container:hover {
            box-shadow: var(--shadow-md);
        }

        table {
            width: 100%;
            min-width: max-content; /* 允许表格根据内容撑开，修复滚动时背景截断 */
            border-collapse: separate;
            border-spacing: 0;
            text-align: center;
        }

        th {
            background: rgba(44, 44, 46, 0.6);
            padding: 16px 12px; /* 稍微缩减左右内边距，给内容更多空间 */
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--divider);
            position: sticky;
            top: 0;
            z-index: 10;
            letter-spacing: 0.01em;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            user-select: none;
            white-space: nowrap; /* 强制表头文字不换行 */
        }
        
        /* 表头列宽拖拽手柄 */
        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 8px;
            cursor: col-resize;
            background: transparent;
            z-index: 15;
            transition: background 0.2s;
        }
        
        .resize-handle:hover,
        .resize-handle.active {
            background: var(--accent-blue);
        }
        
        /* 表头排序交互 */
        th.sortable {
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
        }
        
        th.sortable:hover {
            color: var(--text-primary);
            background: rgba(58, 58, 60, 0.6);
        }
        
        th.sortable i {
            margin-left: 4px;
            font-size: 14px;
            opacity: 0.3;
            transition: opacity 0.2s, transform 0.3s var(--ease-spring);
        }
        
        th.sortable:hover i { opacity: 0.7; }
        
        th.sortable.active i {
            opacity: 1;
            color: var(--accent-blue);
        }
        
        th.sortable.active.desc i {
            transform: rotate(180deg);
        }

        td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
            background: transparent;
            transition: background 0.3s var(--ease-out);
            font-variant-numeric: tabular-nums;
        }

        tr {
            transition: background 0.3s var(--ease-out);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.06);
        }

        /* 超预算行高亮 (Over budget row) */
        tr.row-over-budget td {
            background: rgba(255, 69, 58, 0.08);
        }
        tr.row-over-budget:hover td {
            background: rgba(255, 69, 58, 0.12);
        }
        tr.row-over-budget td[data-col="actualPrice"] {
            color: var(--accent-red);
            font-weight: 600;
        }

        /* 状态徽章 (Apple Badges) */
        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 12px;
            border-radius: 980px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.01em;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
            white-space: nowrap;
            min-width: 60px;
        }

        .status-done { background: rgba(50, 215, 75, 0.15); color: var(--accent-green); }
        .status-paid { background: rgba(255, 159, 10, 0.15); color: var(--accent-orange); }
        .status-pending { background: rgba(10, 132, 255, 0.15); color: var(--accent-blue); }

        /* 拖拽手柄 */
        .drag-handle {
            cursor: grab;
            color: var(--text-tertiary);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.2s;
            padding: 4px;
            border-radius: 6px;
        }
        .drag-handle:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.1);
        }
        .drag-handle:active { cursor: grabbing; transform: scale(0.9); }

        .sortable-ghost { 
            opacity: 0.3; 
            background: #1C1C1E; 
        }
        .sortable-drag { 
            background: #2C2C2E; 
            box-shadow: var(--shadow-float); 
            cursor: grabbing !important; 
            border-radius: var(--radius-md);
            transform: scale(1.02);
        }

        /* 模态框 (Apple Modal/Sheet) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--ease-out);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: rgba(28, 28, 30, 0.95);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 540px;
            box-shadow: var(--shadow-float);
            transform: translateY(40px) scale(0.95);
            transition: all 0.5s var(--ease-spring);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 24px 32px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
        }

        .modal-header h2 { 
            font-size: 24px; 
            font-weight: 700; 
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .modal-body {
            padding: 16px 32px 24px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 16px;
        }
        
        /* 隐藏滚动条 */
        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-track { background: transparent; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full { grid-column: span 2; }
        .form-group label { 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-secondary); 
        }

        .form-control {
            padding: 12px 16px;
            border: 1px solid var(--divider);
            border-radius: var(--radius-md);
            font-size: 15px;
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
            transition: all 0.3s var(--ease-out);
            outline: none;
            width: 100%;
        }
        
        .form-control:hover {
            background: rgba(255,255,255,0.08);
        }
        
        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.2);
        }
        
        .form-control option {
            background: #1C1C1E;
            color: #F5F5F7;
        }

        .modal-footer {
            padding: 20px 32px;
            border-top: 1px solid var(--divider-light);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: rgba(28, 28, 30, 0.5);
            backdrop-filter: blur(10px);
        }

        /* 隐藏的文件输入 */
        #fileInput { display: none; }
        
        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state i {
            font-size: 48px;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }
        .empty-state p {
            font-size: 16px;
            font-weight: 500;
        }
        /* --- 移动端适配 (Mobile Adaptation) --- */
        @media (max-width: 768px) {
            /* 导航栏适配 */
            header {
                padding: 12px 16px;
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            header.scrolled {
                padding: 10px 16px;
            }
            .header-actions {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
            }

            /* 布局适配 */
            .layout-wrapper {
                flex-direction: column;
                padding: 16px;
                gap: 16px;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                position: static;
                overflow-x: auto;
            }
            .nav-item {
                flex: 1;
                justify-content: center;
                padding: 10px;
                white-space: nowrap;
            }

            /* 统计卡片适配：改为两列 */
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .stat-card {
                padding: 16px;
                gap: 8px;
            }
            .stat-value {
                font-size: 24px;
            }
            .stat-title {
                font-size: 13px;
            }

            /* 图表布局适配：单列显示 */
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .chart-card {
                padding: 16px;
            }
            .chart-body {
                min-height: 200px;
            }

            /* 工具栏适配 */
            .toolbar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 12px 16px;
            }
            .search-box {
                width: 100%;
            }
            .filter-group {
                justify-content: flex-start;
                overflow-x: auto;
                white-space: nowrap;
                margin-left: 0 !important;
                margin-right: 0 !important;
                padding-bottom: 4px; /* 防止滚动条遮挡 */
            }
            
            /* 列显示菜单在移动端位置调整 */
            .column-menu {
                right: auto;
                left: 0;
            }
            
            /* 表格容器允许横向滚动，但尽量一屏展示 */
            .table-container {
                overflow-x: hidden; /* 移动端禁止横向滚动 */
                border-radius: var(--radius-md);
            }

            table {
                width: 100%;
                table-layout: fixed; /* 恢复固定布局，强制在一屏内 */
                min-width: 100%;
            }

            /* 表格文字与内边距极简压缩以适应单屏 */
            table th, table td {
                padding: 10px 2px; /* 进一步压缩内边距 */
                font-size: 12px;
                white-space: nowrap;
                text-align: center !important;
            }

            /* 移动端只展示核心字段，隐藏其他列 */
            table th[data-col="drag"], table td[data-col="drag"],
            table th[data-col="priority"], table td[data-col="priority"],
            table th[data-col="category"], table td[data-col="category"],
            table th[data-col="brand"], table td[data-col="brand"],
            table th[data-col="quantity"], table td[data-col="quantity"],
            table th[data-col="diffPrice"], table td[data-col="diffPrice"],
            table th[data-col="channel"], table td[data-col="channel"],
            table th[data-col="notes"], table td[data-col="notes"] {
                display: none !important;
            }

            /* 名称列允许换行展示以适应固定宽度 */
            table th[data-col="name"], table td[data-col="name"] {
                width: auto !important; /* 强制覆盖 JS 设置的宽度 */
                min-width: 0 !important;
                max-width: none !important;
                white-space: normal; /* 允许换行 */
                word-break: break-all;
                padding-left: 4px !important;
                padding-right: 4px;
                text-align: left !important; /* 名称在移动端左对齐更易读 */
            }

            /* 预算和实际金额列表头缩短文字 */
            table th[data-col="budgetPrice"], table th[data-col="actualPrice"] {
                font-size: 0;
                padding-left: 2px;
                padding-right: 2px;
                width: 50px !important; /* 强制固定宽度，忽略 JS 拖拽记录 */
                min-width: 50px !important;
                max-width: 50px !important;
            }
            table th[data-col="budgetPrice"]::before { content: "预算"; font-size: 11px; }
            table th[data-col="actualPrice"]::before { content: "实际"; font-size: 11px; }
            table th[data-col="budgetPrice"] i, table th[data-col="actualPrice"] i { font-size: 14px; margin-left: 0px; }
            
            /* 数据行缩小金额字体 */
            table td[data-col="budgetPrice"], table td[data-col="actualPrice"] {
                font-size: 11px;
                padding-left: 2px;
                padding-right: 2px;
                width: 50px !important; /* 强制固定宽度 */
                min-width: 50px !important;
                max-width: 50px !important;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* 调整状态表头文字对齐和宽度 */
            table th[data-col="status"] {
                text-align: center !important;
                width: 48px !important;
                min-width: 48px !important;
                max-width: 48px !important;
                padding-left: 2px;
                padding-right: 2px;
                font-size: 12px; /* 恢复表头文字大小 */
            }
            table td[data-col="status"] {
                text-align: center !important;
                width: 48px !important;
                min-width: 48px !important;
                max-width: 48px !important;
                padding-left: 2px;
                padding-right: 2px;
            }
            table th[data-col="status"] i {
                font-size: 14px;
                margin-left: 2px;
            }
            /* 状态徽章在移动端只显示颜色圆点 */
            .status-badge {
                width: 10px;
                height: 10px;
                min-width: 10px;
                padding: 0;
                font-size: 0;
                border-radius: 50%;
                display: inline-block;
                vertical-align: middle;
            }
            .status-done { background: var(--accent-green); box-shadow: 0 0 8px rgba(50, 215, 75, 0.4); }
            .status-paid { background: var(--accent-orange); box-shadow: 0 0 8px rgba(255, 159, 10, 0.4); }
            .status-pending { background: var(--accent-blue); box-shadow: 0 0 8px rgba(10, 132, 255, 0.4); }

            /* 操作按钮缩减间距和宽度 */
            table th[data-col="actions"], table td[data-col="actions"] {
                text-align: center !important;
                padding-right: 0px;
                padding-left: 0px;
                width: 48px !important;
                min-width: 48px !important;
                max-width: 48px !important;
            }
            table td[data-col="actions"] .btn {
                padding: 2px;
                gap: 0;
            }
            table td[data-col="actions"] .btn i {
                font-size: 16px; /* 调大操作图标字体以便点击 */
            }

            /* 弹窗适配 */
            .modal {
                width: 95%;
                max-height: 90vh;
                margin: 0 auto;
            }
            .modal-header, .modal-body, .modal-footer {
                padding: 16px;
            }
            .modal-body {
                grid-template-columns: 1fr; /* 单列显示表单 */
                gap: 12px;
            }
            .form-group.full {
                grid-column: span 1;
            }
            .form-control {
                padding: 10px 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>装修预算面板</h1>
        <div class="header-actions">
            <div class="header-actions-group">
                <button class="btn btn-ghost" onclick="syncFromCloud()" title="从云端拉取 (Pull)">
                    <i class="ph ph-cloud-arrow-down" style="font-size: 16px;"></i> 拉取
                </button>
                <button class="btn btn-ghost" onclick="pushToCloud()" title="推送到云端 (Push)">
                    <i class="ph ph-cloud-arrow-up" style="font-size: 16px;"></i> 推送
                </button>
                <button class="btn btn-ghost" onclick="openSettingsModal()" title="设置 GitHub 同步凭证">
                    <i class="ph ph-gear" style="font-size: 16px;"></i> 设置
                </button>
            </div>
            
            <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">
                <i class="ph ph-upload-simple"></i> 导入 JSON
            </button>
            <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
            
            <button class="btn btn-outline" onclick="exportJSON()">
                <i class="ph ph-download-simple"></i> 导出 JSON
            </button>
            <button class="btn btn-outline" onclick="openJsonModal()">
                <i class="ph ph-code"></i> JSON 数据
            </button>
            <button class="btn btn-outline" onclick="exportExcel()">
                <i class="ph ph-file-xls"></i> 导出 Excel
            </button>
            <button class="btn btn-primary" onclick="openModal()">
                <i class="ph ph-plus"></i> 新增项目
            </button>
        </div>
    </header>

    <div class="layout-wrapper">
        <aside class="sidebar">
            <button class="nav-item active" onclick="switchTab('table')" id="tab-table">
                <i class="ph ph-list-dashes"></i> 预算明细
            </button>
            <button class="nav-item" onclick="switchTab('charts')" id="tab-charts">
                <i class="ph ph-chart-pie-slice"></i> 图表分析
            </button>
        </aside>

        <div class="main-content">
            <!-- 工具栏 (搜索、筛选) -->
            <div class="toolbar" id="toolbarView">
                <div class="search-box">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索名称、品牌或备注..." oninput="handleFilter()">
                </div>
                <div class="filter-group" id="categoryFilter" style="margin-right: auto; margin-left: 12px;">
                    <button class="filter-btn active" data-category="all" onclick="setCategoryFilter('all')">全部分类</button>
                    <button class="filter-btn" data-category="硬装" onclick="setCategoryFilter('硬装')">硬装</button>
                    <button class="filter-btn" data-category="家电" onclick="setCategoryFilter('家电')">家电</button>
                    <button class="filter-btn" data-category="必要支出" onclick="setCategoryFilter('必要支出')">必要支出</button>
                </div>
                <div class="filter-group" id="statusFilter">
                    <button class="filter-btn active" data-status="all" onclick="setFilter('all')">全部状态</button>
                    <button class="filter-btn" data-status="待购" onclick="setFilter('待购')">待购</button>
                    <button class="filter-btn" data-status="付款" onclick="setFilter('付款')">付款</button>
                    <button class="filter-btn" data-status="完成" onclick="setFilter('完成')">完成</button>
                </div>
                <!-- 列展示筛选 -->
                <div class="filter-group column-filter" id="columnFilter" style="margin-left: 12px; position: relative;">
                    <button class="filter-btn" onclick="toggleColumnMenu()">
                        <i class="ph ph-columns"></i> 列显示 <i class="ph ph-caret-down" style="font-size: 12px; margin-left: 4px;"></i>
                    </button>
                    <div id="columnMenu" class="column-menu" style="display: none;">
                        <label><input type="checkbox" checked onchange="toggleColumn('priority')"> 优先度</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('category')"> 分类</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('brand')"> 品牌</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('quantity')"> 数量</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('budgetPrice')"> 预算金额</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('actualPrice')"> 实际金额</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('diffPrice')"> 差额</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('channel')"> 购买渠道</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('status')"> 状态</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('notes')"> 备注</label>
                        <label><input type="checkbox" checked onchange="toggleColumn('actions')"> 操作</label>
                    </div>
                </div>
            </div>

        <!-- 统计面板 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label"><i class="ph ph-wallet"></i> 总预算 (¥)</div>
                <div class="value" id="stat-budget">0</div>
            </div>
            <div class="stat-card" id="card-actual">
                <div class="label"><i class="ph ph-credit-card"></i> 实际支出 (¥)</div>
                <div class="value" id="stat-actual">0</div>
            </div>
            <div class="stat-card" id="card-diff">
                <div class="label"><i class="ph ph-scales"></i> 预算差额 (¥)</div>
                <div class="value" id="stat-diff">0</div>
            </div>
            <div class="stat-card">
                <div class="label"><i class="ph ph-chart-pie-slice"></i> 完成率 (%)</div>
                <div class="value" id="stat-rate">0%</div>
            </div>
        </div>

        <!-- 图表与数据可视化 -->
        <div class="charts-container" id="chartsView" style="display: none;">
            <div class="charts-grid" id="chartsGrid">
                <div class="chart-card">
                    <div class="chart-header"><i class="ph ph-chart-bar"></i> 预算 vs 实际支出对比</div>
                    <div class="chart-body">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-header"><i class="ph ph-chart-donut"></i> 采购状态分布</div>
                    <div class="chart-body">
                        <canvas id="doughnutChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="table-container" id="tableView">
            <table>
                <thead>
                    <tr>
                        <th width="40" data-col="drag"></th>
                        <th class="sortable" onclick="handleSort('name')" data-col="name">名称 <i class="ph ph-caret-down"></i></th>
                        <th class="sortable" width="85" onclick="handleSort('priority')" data-col="priority">优先度 <i class="ph ph-caret-down"></i></th>
                        <th class="sortable" onclick="handleSort('category')" data-col="category">分类 <i class="ph ph-caret-down"></i></th>
                        <th class="sortable" onclick="handleSort('brand')" data-col="brand">品牌 <i class="ph ph-caret-down"></i></th>
                        <th data-col="quantity">数量</th>
                        <th class="sortable" onclick="handleSort('budgetPrice')" data-col="budgetPrice">预算金额 <i class="ph ph-caret-down"></i></th>
                        <th class="sortable" onclick="handleSort('actualPrice')" data-col="actualPrice">实际金额 <i class="ph ph-caret-down"></i></th>
                        <th class="sortable" onclick="handleSort('diffPrice')" data-col="diffPrice">差额 <i class="ph ph-caret-down"></i></th>
                        <th data-col="channel">购买渠道</th>
                        <th class="sortable" onclick="handleSort('status')" data-col="status">状态 <i class="ph ph-caret-down"></i></th>
                        <th data-col="notes">备注</th>
                        <th width="80" style="text-align: center;" data-col="actions">操作</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- 数据行由JS动态渲染 -->
                </tbody>
            </table>
            <div id="empty-state" class="empty-state" style="display: none;">
                <i class="ph ph-magnifying-glass-minus"></i>
                <p>没有找到符合条件的项目</p>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">新增项目</h2>
                <button class="btn btn-ghost" onclick="closeModal()"><i class="ph ph-x" style="font-size: 20px;"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="form-id">
                
                <div class="form-group full">
                    <label>名称</label>
                    <input type="text" class="form-control" id="form-name" required placeholder="如：中央空调">
                </div>
                
                <div class="form-group">
                    <label>分类</label>
                    <select class="form-control" id="form-category">
                        <option value="硬装">硬装</option>
                        <option value="家电">家电</option>
                        <option value="必要支出">必要支出</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>品牌</label>
                    <input type="text" class="form-control" id="form-brand" placeholder="如：COLMO">
                </div>
                
                <div class="form-group">
                    <label>数量</label>
                    <input type="number" class="form-control" id="form-quantity" min="1" value="1">
                </div>
                
                <div class="form-group">
                    <label>预算金额 (¥)</label>
                    <input type="number" class="form-control" id="form-budget" min="0" value="0">
                </div>
                
                <div class="form-group">
                    <label>实际金额 (¥)</label>
                    <input type="number" class="form-control" id="form-actual" min="0" value="0">
                </div>
                
                <div class="form-group">
                    <label>购买渠道</label>
                    <input type="text" class="form-control" id="form-channel" placeholder="如：线下实体店、京东">
                </div>
                
                <div class="form-group">
                    <label>优先度</label>
                    <select class="form-control" id="form-priority">
                        <option value="高">高</option>
                        <option value="中">中</option>
                        <option value="低">低</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>状态</label>
                    <select class="form-control" id="form-status">
                        <option value="待购">待购</option>
                        <option value="付款">付款</option>
                        <option value="完成">完成</option>
                    </select>
                </div>
                
                <div class="form-group full">
                    <label>备注</label>
                    <textarea class="form-control" id="form-notes" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveData()">保存</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：GitHub 设置 -->
    <div class="modal-overlay" id="settingsModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="ph ph-github-logo"></i> GitHub 同步设置</h2>
                <button class="btn btn-ghost" onclick="closeSettingsModal()"><i class="ph ph-x" style="font-size: 20px;"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group full">
                    <label>Personal Access Token (必填)</label>
                    <input type="password" class="form-control" id="setting-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                    <p style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">用于授权修改你的 GitHub 仓库，仅保存在本地缓存中，不会上传。</p>
                </div>
                
                <div class="form-group full">
                    <label>仓库拥有者 (Owner)</label>
                    <input type="text" class="form-control" id="setting-owner" placeholder="如：LionelWangs" value="LionelWangs">
                </div>
                
                <div class="form-group full">
                    <label>仓库名称 (Repo)</label>
                    <input type="text" class="form-control" id="setting-repo" placeholder="如：zx-json" value="zx-json">
                </div>
                
                <div class="form-group full">
                    <label>文件路径 (Path)</label>
                    <input type="text" class="form-control" id="setting-path" placeholder="如：装修预算.json" value="装修预算.json">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeSettingsModal()">取消</button>
                <button class="btn btn-primary" onclick="saveSettings()">保存配置</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：JSON 数据 -->
    <div class="modal-overlay" id="jsonModalOverlay">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h2><i class="ph ph-code"></i> JSON 数据</h2>
                <button class="btn btn-ghost" onclick="closeJsonModal()"><i class="ph ph-x" style="font-size: 20px;"></i></button>
            </div>
            <div class="modal-body" style="grid-template-columns: 1fr;">
                <div class="form-group full">
                    <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 8px;">你可以查看、复制当前的 JSON 数据，或者在此处粘贴新的 JSON 数据并保存以覆盖当前页面数据。</p>
                    <textarea class="form-control" id="json-textarea" rows="20" style="font-family: monospace; font-size: 13px; resize: vertical;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="copyJsonData()">复制到剪贴板</button>
                <button class="btn btn-outline" onclick="closeJsonModal()">取消</button>
                <button class="btn btn-primary" onclick="saveJsonData()">保存并覆盖</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 初始化数据与缓存机制 ---
        const CACHE_KEY = 'renovation_data_v1';
        
        // 状态管理
        let appliances = [];
        let filteredData = []; // 用于搜索筛选和排序后的数据
        let currentFilter = 'all'; // all, 待购, 付款, 完成
        let currentCategoryFilter = 'all'; // all, 硬装, 家电, 必要支出
        let currentSearch = '';
        let sortConfig = { key: null, isDesc: false }; // 恢复为默认手动排序，以便使用拖拽功能
        let hiddenColumns = new Set(); // 存储被隐藏的列 data-col 名字
        let columnWidths = {}; // 存储拖拽自定义的列宽
        
        // GitHub 同步配置
        let githubConfig = {
            token: '',
            owner: 'LionelWangs',
            repo: 'zx-json',
            path: '装修预算.json',
            branch: 'main'
        };
        
        // 图表实例
        let barChartInstance = null;
        let doughnutChartInstance = null;

        // 默认数据
        const defaultData = [];

        let currentTab = 'table'; // 'table' or 'charts'

        function switchTab(tab) {
            currentTab = tab;
            
            // Update sidebar UI
            document.getElementById('tab-table').classList.toggle('active', tab === 'table');
            document.getElementById('tab-charts').classList.toggle('active', tab === 'charts');
            
            // Update content visibility
            document.getElementById('toolbarView').style.display = tab === 'table' ? 'flex' : 'none';
            document.getElementById('tableView').style.display = tab === 'table' ? 'block' : 'none';
            document.getElementById('chartsView').style.display = tab === 'charts' ? 'block' : 'none';

            if (tab === 'charts') {
                // Resize charts
                if (barChartInstance) barChartInstance.resize();
                if (doughnutChartInstance) doughnutChartInstance.resize();
            }
            
            // Save tab state (optional)
            localStorage.setItem(CACHE_KEY + '_current_tab', tab);
        }

        function init() {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {
                    appliances = JSON.parse(cached);
                } catch (e) {
                    appliances = JSON.parse(JSON.stringify(defaultData));
                }
            } else {
                appliances = JSON.parse(JSON.stringify(defaultData));
            }
            
            // 恢复自定义列宽
            const savedWidths = localStorage.getItem(CACHE_KEY + '_col_widths');
            if (savedWidths) {
                try {
                    columnWidths = JSON.parse(savedWidths);
                } catch(e) {}
            }
            
            // 兼容历史数据，迁移状态名称，添加默认优先度
            appliances.forEach(item => {
                if (item.status === '已完成') {
                    item.status = '完成';
                } else if (item.status === '已付款') {
                    item.status = '付款';
                }
                if (!item.priority) {
                    item.priority = '中'; // 默认优先度
                }
            });
            
            // 初始化表头 UI 状态
            document.querySelectorAll('th.sortable').forEach(th => {
                th.classList.remove('active', 'desc');
                const thOnclick = th.getAttribute('onclick');
                if (thOnclick && thOnclick.includes(`'${sortConfig.key}'`)) {
                    th.classList.add('active');
                    if (sortConfig.isDesc) th.classList.add('desc');
                }
            });
            
            // 恢复图表折叠状态
            const savedTab = localStorage.getItem(CACHE_KEY + '_current_tab');
            if (savedTab) {
                switchTab(savedTab);
            } else {
                switchTab('table');
            }
            
            // 恢复隐藏列状态
            const savedHiddenCols = localStorage.getItem(CACHE_KEY + '_hidden_cols');
            if (savedHiddenCols) {
                try {
                    const parsedCols = JSON.parse(savedHiddenCols);
                    parsedCols.forEach(col => {
                        hiddenColumns.add(col);
                        const checkbox = document.querySelector(`.column-menu input[onchange="toggleColumn('${col}')"]`);
                        if (checkbox) checkbox.checked = false;
                    });
                } catch(e) {}
            }
            
            // 恢复 GitHub 配置
            const cachedGithub = localStorage.getItem(CACHE_KEY + '_github_config');
            if (cachedGithub) {
                try {
                    githubConfig = { ...githubConfig, ...JSON.parse(cachedGithub) };
                } catch (e) {
                    console.error('GitHub配置解析失败', e);
                }
            }
            
            // 滚动效果
            window.addEventListener('scroll', () => {
                const header = document.querySelector('header');
                if (window.scrollY > 10) header.classList.add('scrolled');
                else header.classList.remove('scrolled');
            });
            
            applyFiltersAndSort();
            initSortable();
            
            // 初始化列宽拖拽
            initResizableColumns();
        }

        // --- 列宽拖拽功能 ---
        function initResizableColumns() {
            let isResizing = false;
            let currentTh = null;
            let startX = 0;
            let startWidth = 0;
            let colName = '';

            const ths = document.querySelectorAll('th[data-col]');
            ths.forEach(th => {
                // 不给拖拽列添加手柄
                if (th.getAttribute('data-col') === 'drag') return;
                
                const handle = document.createElement('div');
                handle.className = 'resize-handle';
                th.appendChild(handle);

                const startDrag = function(e) {
                    isResizing = true;
                    currentTh = th;
                    colName = th.getAttribute('data-col');
                    startX = e.pageX || (e.touches && e.touches[0].pageX);
                    startWidth = th.offsetWidth;
                    handle.classList.add('active');
                    e.stopPropagation();
                    // 阻止默认行为可能会阻止手机滚动，对于表头手柄我们阻止它以防误触
                };

                handle.addEventListener('mousedown', startDrag);
                handle.addEventListener('touchstart', startDrag, { passive: true });
            });

            const onMove = function(e) {
                if (!isResizing || !currentTh) return;
                const pageX = e.pageX || (e.touches && e.touches[0].pageX);
                const diff = pageX - startX;
                const newWidth = Math.max(40, startWidth + diff); // 最小宽度 40px
                
                // 实时更新当前列宽
                columnWidths[colName] = newWidth;
                
                // 更新样式
                currentTh.style.width = newWidth + 'px';
                currentTh.style.minWidth = newWidth + 'px';
                currentTh.style.maxWidth = newWidth + 'px';
                
                const tds = document.querySelectorAll(`td[data-col="${colName}"]`);
                tds.forEach(td => {
                    td.style.width = newWidth + 'px';
                    td.style.minWidth = newWidth + 'px';
                    td.style.maxWidth = newWidth + 'px';
                });
            };

            const onEnd = function() {
                if (isResizing) {
                    isResizing = false;
                    if (currentTh) {
                        const handle = currentTh.querySelector('.resize-handle');
                        if (handle) handle.classList.remove('active');
                        currentTh = null;
                        
                        // 拖拽结束后保存到本地
                        localStorage.setItem(CACHE_KEY + '_col_widths', JSON.stringify(columnWidths));
                    }
                }
            };

            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchmove', onMove, { passive: true });
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchend', onEnd);
        }

        function saveToCache() {
            localStorage.setItem(CACHE_KEY, JSON.stringify(appliances));
        }

        function toggleColumnMenu() {
            const menu = document.getElementById('columnMenu');
            menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
        }

        // 点击页面其他地方关闭列筛选菜单
        document.addEventListener('click', (e) => {
            const filter = document.getElementById('columnFilter');
            const menu = document.getElementById('columnMenu');
            if (filter && menu && !filter.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

        function toggleColumn(col) {
            if (hiddenColumns.has(col)) {
                hiddenColumns.delete(col);
            } else {
                hiddenColumns.add(col);
            }
            localStorage.setItem(CACHE_KEY + '_hidden_cols', JSON.stringify(Array.from(hiddenColumns)));
            applyFiltersAndSort();
        }

        // --- 数据处理层 (过滤与排序) ---
        function setFilter(status) {
            currentFilter = status;
            // 更新按钮UI
            document.querySelectorAll('#statusFilter .filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });
            applyFiltersAndSort();
        }

        function setCategoryFilter(category) {
            currentCategoryFilter = category;
            document.querySelectorAll('#categoryFilter .filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            applyFiltersAndSort();
        }

        function handleFilter() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            applyFiltersAndSort();
        }

        function handleSort(key) {
            if (sortConfig.key === key) {
                if (sortConfig.isDesc) {
                    sortConfig.key = null; // 取消排序
                } else {
                    sortConfig.isDesc = true; // 切换为降序
                }
            } else {
                sortConfig.key = key;
                sortConfig.isDesc = false; // 默认升序
            }
            
            // 更新表头 UI
            document.querySelectorAll('th.sortable').forEach(th => {
                th.classList.remove('active', 'desc');
                const thOnclick = th.getAttribute('onclick');
                if (thOnclick.includes(`'${key}'`)) {
                    if (sortConfig.key) {
                        th.classList.add('active');
                        if (sortConfig.isDesc) th.classList.add('desc');
                    }
                }
            });

            applyFiltersAndSort();
        }

        function applyFiltersAndSort() {
            // 1. 过滤
            filteredData = appliances.filter(item => {
                const matchStatus = currentFilter === 'all' || item.status === currentFilter;
                const matchCategory = currentCategoryFilter === 'all' || item.category === currentCategoryFilter;
                const searchTarget = `${item.name} ${item.category} ${item.brand} ${item.notes}`.toLowerCase();
                const matchSearch = currentSearch === '' || searchTarget.includes(currentSearch);
                return matchStatus && matchCategory && matchSearch;
            });

            // 2. 排序
            if (sortConfig.key) {
                filteredData.sort((a, b) => {
                    let valA = a[sortConfig.key];
                    let valB = b[sortConfig.key];
                    
                    // 数字排序
                    if (['budgetPrice', 'actualPrice', 'diffPrice'].includes(sortConfig.key)) {
                        if (sortConfig.key === 'diffPrice') {
                            valA = (Number(a.budgetPrice) || 0) - (Number(a.actualPrice) || 0);
                            valB = (Number(b.budgetPrice) || 0) - (Number(b.actualPrice) || 0);
                        } else {
                            valA = Number(valA) || 0;
                            valB = Number(valB) || 0;
                        }
                        return sortConfig.isDesc ? valB - valA : valA - valB;
                    }
                    
                    // 状态排序映射优先级
                    if (sortConfig.key === 'status') {
                        const statusWeight = { '完成': 3, '付款': 2, '待购': 1 };
                        valA = statusWeight[valA] || 0;
                        valB = statusWeight[valB] || 0;
                        return sortConfig.isDesc ? valB - valA : valA - valB;
                    }

                    // 优先度排序映射优先级
                    if (sortConfig.key === 'priority') {
                        const priorityWeight = { '高': 3, '中': 2, '低': 1 };
                        valA = priorityWeight[valA] || 0;
                        valB = priorityWeight[valB] || 0;
                        return sortConfig.isDesc ? valB - valA : valA - valB;
                    }

                    // 字符串排序
                    valA = String(valA || '');
                    valB = String(valB || '');
                    return sortConfig.isDesc ? valB.localeCompare(valA) : valA.localeCompare(valB);
                });
            }

            render();
        }

        // --- 渲染引擎 ---
        function render() {
            const tbody = document.getElementById('table-body');
            const emptyState = document.getElementById('empty-state');
            tbody.innerHTML = '';

            let totalBudget = 0;
            let totalActual = 0;
            let completedCount = 0;
            
            // 图表数据收集
            let chartLabels = [];
            let chartBudgets = [];
            let chartActuals = [];
            let statusCount = { '待购': 0, '付款': 0, '完成': 0 };

            // 统计基于筛选后的数据计算
            filteredData.forEach(item => {
                totalBudget += Number(item.budgetPrice) || 0;
                // 排除“待购”状态的项
                if (item.status !== '待购') {
                    totalActual += Number(item.actualPrice) || 0;
                }
                if (item.status === '完成') completedCount++;
                
                if (item.status) {
                    statusCount[item.status] = (statusCount[item.status] || 0) + 1;
                }
            });

            if (filteredData.length === 0) {
                emptyState.style.display = 'block';
                document.querySelector('table').style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                document.querySelector('table').style.display = 'table';
                
                // 应用列隐藏样式和列宽
                document.querySelectorAll('th[data-col]').forEach(th => {
                    const colName = th.getAttribute('data-col');
                    if (hiddenColumns.has(colName)) {
                        th.style.display = 'none';
                    } else {
                        th.style.display = 'table-cell'; // 覆盖可能存在的移动端 CSS 隐藏
                        if (columnWidths[colName]) {
                            th.style.width = columnWidths[colName] + 'px';
                            th.style.minWidth = columnWidths[colName] + 'px';
                            th.style.maxWidth = columnWidths[colName] + 'px';
                        }
                    }
                });

                filteredData.forEach((item, index) => {
                    const bPrice = Number(item.budgetPrice) || 0;
                    const aPrice = Number(item.actualPrice) || 0;
                    const diffPrice = bPrice - aPrice;
                    
                    // 取前 15 项数据渲染柱状图（避免图表太挤）
                    if (index < 15) {
                        chartLabels.push(item.name ? (item.name.length > 6 ? item.name.substring(0, 6) + '...' : item.name) : '未命名');
                        chartBudgets.push(bPrice);
                        chartActuals.push(aPrice);
                    }
                    
                    // 判断超预算 (实际 > 预算，且预算不为0)
                    const isOverBudget = bPrice > 0 && aPrice > bPrice;

                    let diffHtml = '';
                    if (diffPrice < 0) {
                        diffHtml = `<span style="color: var(--accent-red); font-weight: 600;">${diffPrice.toLocaleString()}</span>`;
                    } else if (diffPrice > 0) {
                        diffHtml = `<span style="color: var(--accent-green); font-weight: 600;">+${diffPrice.toLocaleString()}</span>`;
                    } else {
                        diffHtml = `<span style="color: var(--text-secondary); font-weight: 600;">0</span>`;
                    }

                    // 状态徽章映射
                    let statusClass = 'status-pending';
                    if (item.status === '完成') statusClass = 'status-done';
                    if (item.status === '付款') statusClass = 'status-paid';
                    
                    // 优先度映射
                    let priorityColor = 'var(--text-secondary)';
                    if (item.priority === '高') priorityColor = 'var(--accent-red)';
                    else if (item.priority === '中') priorityColor = 'var(--accent-orange)';

                    const tr = document.createElement('tr');
                    tr.setAttribute('data-id', item.id);
                    if (isOverBudget) tr.classList.add('row-over-budget');
                    
                    // 如果正在排序或筛选，隐藏拖拽手柄（避免破坏原数组顺序）
                    const canDrag = currentFilter === 'all' && currentSearch === '' && sortConfig.key === null;
                    const dragHtml = canDrag 
                        ? `<div class="drag-handle"><i class="ph ph-list"></i></div>` 
                        : `<div style="width:20px;"></div>`;

                    tr.innerHTML = `
                        <td data-col="drag">${dragHtml}</td>
                        <td data-col="name" style="font-weight: 600; color: var(--text-primary);" title="${item.name || '-'}">${item.name || '-'}</td>
                        <td data-col="priority" style="color: ${priorityColor}; font-weight: 600;">${item.priority || '-'}</td>
                        <td data-col="category" style="color: var(--text-secondary);">${item.category || '-'}</td>
                        <td data-col="brand" style="color: var(--text-secondary);">${item.brand || '-'}</td>
                        <td data-col="quantity" style="color: var(--text-secondary);">${item.quantity || 1}</td>
                        <td data-col="budgetPrice" title="¥${bPrice.toLocaleString()}">¥${bPrice.toLocaleString()}</td>
                        <td data-col="actualPrice" style="font-weight: 600;" title="¥${aPrice.toLocaleString()}">¥${aPrice.toLocaleString()} ${isOverBudget ? '<i class="ph-fill ph-warning-circle" style="color: var(--accent-red); margin-left: 4px;"></i>' : ''}</td>
                        <td data-col="diffPrice" title="¥${diffPrice.toLocaleString()}">${diffHtml}</td>
                        <td data-col="channel" style="color: var(--text-secondary);">${item.purchaseChannel || '-'}</td>
                        <td data-col="status"><span class="status-badge ${statusClass}" title="${item.status}">${item.status}</span></td>
                        <td data-col="notes" style="color: var(--text-secondary); font-size: 13px; max-width: 200px;">
                            <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${item.notes || ''}">
                                ${item.notes || '-'}
                            </div>
                        </td>
                        <td data-col="actions" style="text-align: center; white-space: nowrap;">
                            <button class="btn btn-ghost" onclick="editData(${item.id})"><i class="ph ph-pencil-simple"></i></button>
                            <button class="btn btn-ghost btn-danger" onclick="deleteData(${item.id})"><i class="ph ph-trash"></i></button>
                        </td>
                    `;
                    
                    // 新增渲染后再次根据 hiddenColumns 隐藏 td，避免新行闪烁
                    // 并且应用保存的列宽
                    tr.querySelectorAll('td[data-col]').forEach(el => {
                        const colName = el.getAttribute('data-col');
                        if (hiddenColumns.has(colName)) {
                            el.style.display = 'none';
                        } else {
                            el.style.display = 'table-cell'; // 覆盖移动端 CSS
                            if (columnWidths[colName]) {
                                el.style.width = columnWidths[colName] + 'px';
                                el.style.minWidth = columnWidths[colName] + 'px';
                                el.style.maxWidth = columnWidths[colName] + 'px';
                            }
                        }
                    });

                    tbody.appendChild(tr);
                });
            }

            // 更新统计面板
            const diff = totalBudget - totalActual;
            const rate = filteredData.length > 0 ? Math.round((completedCount / filteredData.length) * 100) : 0;

            // 数字滚动动画工具函数
            animateValue(document.getElementById('stat-budget'), totalBudget);
            animateValue(document.getElementById('stat-actual'), totalActual);
            
            const diffEl = document.getElementById('stat-diff');
            const cardDiff = document.getElementById('card-diff');
            animateValue(diffEl, diff, true);
            
            if (diff < 0) {
                cardDiff.className = 'stat-card over-budget';
            } else if (diff > 0) {
                cardDiff.className = 'stat-card positive';
            } else {
                cardDiff.className = 'stat-card';
            }

            document.getElementById('stat-rate').innerText = rate + '%';
            
            // 总体超预算卡片高亮
            const cardActual = document.getElementById('card-actual');
            if (totalActual > totalBudget && totalBudget > 0) {
                cardActual.classList.add('over-budget');
            } else {
                cardActual.classList.remove('over-budget');
            }
            
            // 更新图表
            updateCharts(chartLabels, chartBudgets, chartActuals, statusCount);

            saveToCache();
        }
        
        // --- 渲染图表 ---
        function updateCharts(labels, budgets, actuals, statusCount) {
            // Chart.js 全局配置 (适配暗色模式)
            Chart.defaults.color = '#86868B';
            Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif';
            
            // 1. 柱状图: 预算 vs 实际
            const barCtx = document.getElementById('barChart').getContext('2d');
            
            if (barChartInstance) barChartInstance.destroy();
            
            barChartInstance = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '预算金额',
                            data: budgets,
                            backgroundColor: 'rgba(10, 132, 255, 0.2)',
                            borderColor: '#0A84FF',
                            borderWidth: 1,
                            borderRadius: 4,
                            barPercentage: 0.6,
                            categoryPercentage: 0.8
                        },
                        {
                            label: '实际支出',
                            data: actuals,
                            backgroundColor: actuals.map((a, i) => a > budgets[i] && budgets[i] > 0 ? 'rgba(255, 69, 58, 0.8)' : 'rgba(50, 215, 75, 0.8)'),
                            borderRadius: 4,
                            barPercentage: 0.6,
                            categoryPercentage: 0.8
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 800,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'end',
                            labels: { boxWidth: 12, usePointStyle: true, padding: 20 }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(28, 28, 30, 0.9)',
                            titleColor: '#FFF',
                            bodyColor: '#F5F5F7',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            padding: 12,
                            boxPadding: 6,
                            usePointStyle: true,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('zh-CN', { style: 'currency', currency: 'CNY' }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false, drawBorder: false }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)', drawBorder: false },
                            ticks: {
                                callback: function(value) {
                                    return value >= 1000 ? (value/1000) + 'k' : value;
                                }
                            }
                        }
                    }
                }
            });

            // 2. 环形图: 状态分布
            const donutCtx = document.getElementById('doughnutChart').getContext('2d');
            
            if (doughnutChartInstance) doughnutChartInstance.destroy();
            
            const totalStatus = statusCount['待购'] + statusCount['付款'] + statusCount['完成'];
            
            doughnutChartInstance = new Chart(donutCtx, {
                type: 'doughnut',
                data: {
                    labels: ['待购', '付款', '完成'],
                    datasets: [{
                        data: totalStatus === 0 ? [1, 0, 0] : [statusCount['待购'], statusCount['付款'], statusCount['完成']],
                        backgroundColor: [
                            'rgba(10, 132, 255, 0.8)', // 蓝
                            'rgba(255, 159, 10, 0.8)', // 橙
                            'rgba(50, 215, 75, 0.8)'   // 绿
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    animation: {
                        animateScale: true,
                        animateRotate: true,
                        duration: 1000,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { padding: 20, usePointStyle: true, boxWidth: 10 }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(28, 28, 30, 0.9)',
                            padding: 12,
                            usePointStyle: true,
                            callbacks: {
                                label: function(context) {
                                    if (totalStatus === 0) return ' 暂无数据';
                                    const value = context.raw;
                                    const percentage = Math.round((value / totalStatus) * 100);
                                    return ` ${context.label}: ${value} 项 (${percentage}%)`;
                                }
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'centerText',
                    beforeDraw: function(chart) {
                        if (totalStatus === 0) return;
                        var width = chart.width,
                            height = chart.height,
                            ctx = chart.ctx;
                
                        ctx.restore();
                        var fontSize = (height / 120).toFixed(2);
                        ctx.font = "600 " + fontSize + "em -apple-system, BlinkMacSystemFont, sans-serif";
                        ctx.textBaseline = "middle";
                        ctx.fillStyle = "#F5F5F7";
                
                        var text = totalStatus,
                            textX = Math.round((width - ctx.measureText(text).width) / 2),
                            textY = height / 2 - 10;
                
                        ctx.fillText(text, textX, textY);
                        
                        ctx.font = "500 " + (fontSize * 0.4).toFixed(2) + "em -apple-system, sans-serif";
                        ctx.fillStyle = "#86868B";
                        var labelText = "总项目数",
                            labelX = Math.round((width - ctx.measureText(labelText).width) / 2),
                            labelY = height / 2 + 15;
                            
                        ctx.fillText(labelText, labelX, labelY);
                        ctx.save();
                    }
                }]
