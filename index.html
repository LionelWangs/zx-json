        // 数字增长动画
        function animateValue(obj, end, isDiff = false) {
            const duration = 600;
            const start = Number(obj.innerText.replace(/[^0-9.-]+/g,"")) || 0;
            if (start === end) return;
            
            const range = end - start;
            let current = start;
            const increment = end > start ? 1 : -1;
            const stepTime = Math.abs(Math.floor(duration / range));
            
            let startTime = null;
            const step = (timestamp) => {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                // Ease out cubic
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                let currentVal = Math.floor(start + (range * easeProgress));
                if (progress === 1) currentVal = end;
                
                obj.innerText = (isDiff && currentVal > 0 ? '+' : '') + currentVal.toLocaleString();
                
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        // 推送到 GitHub
        async function pushToCloud() {
            if (!githubConfig.token) {
                alert('请先点击"设置"配置你的 GitHub Personal Access Token！');
                openSettingsModal();
                return;
            }

            if (!confirm('这将会把当前本地的所有数据覆盖到 GitHub 仓库中，是否继续？')) return;

            const btn = document.querySelector('button[onclick="pushToCloud()"]');
            const originalText = btn.innerHTML;
            
            try {
                btn.innerHTML = '<i class="ph ph-spinner ph-spin" style="font-size: 16px;"></i> 推送中';
                btn.style.opacity = '0.7';
                btn.style.pointerEvents = 'none';

                // 1. 构造需要推送的数据
                let totalBudget = 0, totalActual = 0, completedCount = 0;
                appliances.forEach(item => {
                    totalBudget += Number(item.budgetPrice) || 0;
                    if (item.status !== '待购') {
                        totalActual += Number(item.actualPrice) || 0;
                    }
                    if (item.status === '完成') completedCount++;
                });

                const exportData = {
                    exportTime: new Date().toLocaleString('zh-CN', { hour12: false }),
                    appliances: appliances,
                    statistics: {
                        totalBudget,
                        totalActual,
                        budgetDifference: totalBudget - totalActual,
                        totalQuantity: appliances.reduce((sum, item) => sum + (Number(item.quantity) || 1), 0),
                        completedCount,
                        completionRate: appliances.length > 0 ? Math.round((completedCount / appliances.length) * 100) : 0
                    }
                };

                const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(exportData, null, 2))));
                const apiUrl = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${encodeURIComponent(githubConfig.path)}`;

                // 2. 先获取当前主文件的 SHA (如果文件已存在)
                let currentSha = null;
                let oldContentBase64 = null;
                try {
                    // 添加时间戳防止 GitHub API 缓存导致拿到旧的 SHA
                    const getRes = await fetch(`${apiUrl}?ref=${githubConfig.branch}&t=${new Date().getTime()}`, {
                        headers: {
                            'Authorization': `token ${githubConfig.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    if (getRes.ok) {
                        const fileData = await getRes.json();
                        currentSha = fileData.sha;
                        oldContentBase64 = fileData.content;
                    } else {
                        console.log('获取文件信息响应状态异常:', getRes.status);
                    }
                } catch (e) {
                    console.error('获取文件SHA失败，可能主文件是第一次创建或网络异常:', e);
                }
                
                // 3. 只要旧文件存在，就备份一份到 history 目录（降低条件，确保触发）
                if (currentSha && oldContentBase64) {
                    try {
                        const d = new Date();
                        // 格式化为：YYYY-MM-DD_HH-mm-ss
                        const timeStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}_${String(d.getHours()).padStart(2, '0')}-${String(d.getMinutes()).padStart(2, '0')}-${String(d.getSeconds()).padStart(2, '0')}`;
                        
                        // 提取原文件的路径（去掉文件名部分）
                        const pathParts = githubConfig.path.split('/');
                        pathParts.pop(); // 丢弃原文件名
                        
                        // 构造备份路径: history/原目录/2026-04-13_15-30-22.json
                        const backupDir = pathParts.length > 0 ? `history/${pathParts.join('/')}` : 'history';
                        const backupPath = `${backupDir}/${timeStr}.json`;
                        const backupApiUrl = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${encodeURIComponent(backupPath)}`;
                        
                        console.log(`正在备份旧数据到: ${backupPath}`);
                        
                        const backupRes = await fetch(backupApiUrl, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${githubConfig.token}`,
                                'Accept': 'application/vnd.github.v3+json',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Auto backup before update - ${timeStr}`,
                                content: oldContentBase64,
                                branch: githubConfig.branch
                            })
                        });
                        
                        if (backupRes.ok) {
                            console.log(`✅ 历史备份成功: ${backupPath}`);
                        } else {
                            const errorMsg = await backupRes.text();
                            console.error('❌ 备份请求失败:', errorMsg);
                            alert(`备份文件创建失败，错误码：${backupRes.status}，详细信息请查看控制台。`);
                        }
                    } catch (backupErr) {
                        console.error('❌ 备份历史数据请求抛出异常', backupErr);
                        alert('备份请求异常：' + backupErr.message);
                    }
                }

                // 4. 执行 PUT 更新或创建主文件
                // 如果刚刚执行了备份（并且没有抛出致命异常），主文件的 sha 并没有变
                const bodyData = {
                    message: `Update budget via Web App - ${new Date().toLocaleString()}`,
                    content: contentBase64,
                    branch: githubConfig.branch
                };
                if (currentSha) {
                    bodyData.sha = currentSha;
                }

                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bodyData)
                });

                if (!putRes.ok) {
                    const errorMsg = await putRes.text();
                    throw new Error(`GitHub API Error: ${putRes.status} ${errorMsg}`);
                }

                alert('🚀 成功推送到 GitHub 仓库！');
            } catch (err) {
                console.error("推送失败", err);
                alert(`推送失败，请检查 Token 权限、仓库名及路径是否正确。\n\n错误信息：${err.message}`);
            } finally {
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }
        }

        async function syncFromCloud() {
            if (!confirm('从云端同步将覆盖当前本地所有数据，并且不可恢复。\n请确认云端数据是最新的！是否继续？')) {
                return;
            }

            // GitHub Raw 地址原生支持 CORS，不需要任何第三方代理服务！
            const githubUrl = `https://raw.githubusercontent.com/${githubConfig.owner}/${githubConfig.repo}/refs/heads/${githubConfig.branch}/${encodeURIComponent(githubConfig.path)}`;
            // 仅保留添加随机数防缓存
            const cloudUrl = `${githubUrl}?t=${new Date().getTime()}`;
            
            const btn = document.querySelector('button[onclick="syncFromCloud()"]');
            const originalText = btn.innerHTML;
            
            try {
                // 按钮加载状态
                btn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> 同步中...';
                btn.style.opacity = '0.7';
                btn.style.pointerEvents = 'none';

                const response = await fetch(cloudUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const importedData = await response.json();
                
                if (importedData.appliances && Array.isArray(importedData.appliances)) {
                    // --- 核心 Diff 对比算法 ---
                    let addedCount = 0;
                    let updatedCount = 0;
                    let deletedCount = 0;
                    
                    const localDataMap = new Map(appliances.map(item => [item.id, item]));
                    const cloudDataMap = new Map(importedData.appliances.map(item => [item.id, item]));
                    
                    // 1. 找新增和修改
                    importedData.appliances.forEach(cloudItem => {
                        if (!localDataMap.has(cloudItem.id)) {
                            addedCount++;
                        } else {
                            // 深度对比对象是否发生变化（忽略可能存在的内存引用差异）
                            const localItemStr = JSON.stringify(localDataMap.get(cloudItem.id));
                            const cloudItemStr = JSON.stringify(cloudItem);
                            if (localItemStr !== cloudItemStr) {
                                updatedCount++;
                            }
                        }
                    });
                    
                    // 2. 找删除
                    appliances.forEach(localItem => {
                        if (!cloudDataMap.has(localItem.id)) {
                            deletedCount++;
                        }
                    });

                    // 覆盖本地数据
                    appliances = importedData.appliances;
                    
                    // 重置筛选和搜索状态，展示云端全量数据
                    currentFilter = 'all';
                    currentSearch = '';
                    sortConfig = { key: null, isDesc: false };
                    document.getElementById('searchInput').value = '';
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.status === 'all'));
                    
                    applyFiltersAndSort();
                    
                    // 动态弹窗提示 Diff 结果
                    if (addedCount === 0 && updatedCount === 0 && deletedCount === 0) {
                        alert('🎉 云端同步成功！\n\n云端数据与本地完全一致，没有发生任何变更。');
                    } else {
                        alert(`🎉 云端同步成功！\n\n数据变更详情：\n✨ 新增：${addedCount} 条\n📝 修改：${updatedCount} 条\n🗑️ 删除：${deletedCount} 条`);
                    }
                } else {
                    throw new Error('文件格式错误：未找到 appliances 数组。');
                }
            } catch (err) {
                console.error("同步失败", err);
                alert(`云端同步失败，请检查网络或文件地址是否正确。\n可能的原因：文件尚未上传、设为了私有，或者网络被拦截。\n\n错误信息：${err.message}`);
            } finally {
                // 恢复按钮状态
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }
        }

        // --- 6. 高级 Excel 导出 (保持样式) ---
        function exportExcel() {
            // 使用当前视图的数据（即支持导出过滤和排序后的结果）
            const dataToExport = filteredData.length > 0 || currentFilter !== 'all' || currentSearch !== '' ? filteredData : appliances;

            if (dataToExport.length === 0) {
                return alert('没有可导出的数据！');
            }

            // 构造二维数组 (AOA)
            const headers = ["名称", "优先度", "分类", "品牌", "数量", "预算金额(¥)", "实际金额(¥)", "差额(¥)", "购买渠道", "状态", "备注"];
            const aoa = [headers];

            dataToExport.forEach(item => {
                const bPrice = Number(item.budgetPrice) || 0;
                const aPrice = Number(item.actualPrice) || 0;
                const diffPrice = bPrice - aPrice;

                aoa.push([
                    item.name || '',
                    item.priority || '',
                    item.category || '',
                    item.brand || '',
                    item.quantity || 1,
                    bPrice,
                    aPrice,
                    diffPrice,
                    item.purchaseChannel || '',
                    item.status || '',
                    item.notes || ''
                ]);
            });

            // 创建工作簿和工作表
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(aoa);

            // 通用边框样式
            const borderStyle = {
                top: { style: "thin", color: { rgb: "D1D1D6" } },
                bottom: { style: "thin", color: { rgb: "D1D1D6" } },
                left: { style: "thin", color: { rgb: "D1D1D6" } },
                right: { style: "thin", color: { rgb: "D1D1D6" } }
            };

            // 表头样式
            const headerStyle = {
                font: { bold: true, color: { rgb: "FFFFFF" }, sz: 12, name: "Arial" },
                fill: { fgColor: { rgb: "1C1C1E" } }, // 暗色表头
                alignment: { horizontal: "center", vertical: "center" },
                border: borderStyle
            };

            // 基础数据行样式
            const baseStyle = {
                font: { sz: 11, color: { rgb: "1D1D1F" }, name: "Arial" },
                alignment: { vertical: "center", horizontal: "center" },
                border: borderStyle
            };

            // 获取有效范围
            const range = XLSX.utils.decode_range(ws['!ref']);

            // 行高配置 (hpx: pixels)
            ws['!rows'] = [];

            // 遍历所有单元格应用样式
            for (let R = range.s.r; R <= range.e.r; ++R) {
                // 设置行高：表头 30px，数据行 40px
                ws['!rows'][R] = { hpx: R === 0 ? 30 : 40 };

                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const cellAddress = {c: C, r: R};
                    const cellRef = XLSX.utils.encode_cell(cellAddress);
                    if (!ws[cellRef]) ws[cellRef] = { t: 's', v: '' }; // 填充空单元格

                    // 第一行表头样式
                    if (R === 0) {
                        ws[cellRef].s = headerStyle;
                    } else {
                        // 拷贝基础样式，防止引用污染
                        let cellStyle = JSON.parse(JSON.stringify(baseStyle));
                        
                        const rowData = dataToExport[R - 1];
                        const bPrice = Number(rowData.budgetPrice) || 0;
                        const aPrice = Number(rowData.actualPrice) || 0;
                        const isOverBudget = bPrice > 0 && aPrice > bPrice;

                        // 针对特定列的样式微调
                        if (C === 5 || C === 6 || C === 7) {
                            // 金额列数字格式
                            ws[cellRef].t = 'n'; 
                            cellStyle.font.bold = (C === 6 || C === 7); // 实际金额、差额加粗
                            cellStyle.alignment.horizontal = "right"; // 金额右对齐
                            
                            // 实际金额超预算变红
                            if (C === 6 && isOverBudget) {
                                cellStyle.font.color = { rgb: "FF3B30" };
                            }
                            
                            // 差额颜色
                            if (C === 7) {
                                const diffPrice = bPrice - aPrice;
                                if (diffPrice < 0) {
                                    cellStyle.font.color = { rgb: "FF3B30" }; // 红
                                } else if (diffPrice > 0) {
                                    cellStyle.font.color = { rgb: "30D158" }; // 绿
                                }
                            }
                        }

                        // 状态列特殊颜色
                        if (C === 9) {
                            const status = ws[cellRef].v;
                            cellStyle.alignment.horizontal = "center";
                            cellStyle.font.bold = true;
                            if (status === '完成') {
                                cellStyle.font.color = { rgb: "248A3D" };
                                cellStyle.fill = { fgColor: { rgb: "EBF9F0" } };
                            } else if (status === '付款') {
                                cellStyle.font.color = { rgb: "B26800" };
                                cellStyle.fill = { fgColor: { rgb: "FFF6E5" } };
                            } else {
                                cellStyle.font.color = { rgb: "0056B3" };
                                cellStyle.fill = { fgColor: { rgb: "E5F1FF" } };
                            }
                        }
                        
                        // 优先度列特殊颜色
                        if (C === 1) {
                            const priority = ws[cellRef].v;
                            cellStyle.alignment.horizontal = "center";
                            cellStyle.font.bold = true;
                            if (priority === '高') {
                                cellStyle.font.color = { rgb: "FF3B30" };
                            } else if (priority === '中') {
                                cellStyle.font.color = { rgb: "FF9F0A" };
                            } else {
                                cellStyle.font.color = { rgb: "8E8E93" };
                            }
                        }

                        // 整行超预算时，名称列加个微红底色（可选）
                        if (isOverBudget && C !== 9) {
                            cellStyle.fill = { fgColor: { rgb: "FFF2F2" } };
                        }

                        // 备注列、品牌列次要文本
                        if (C === 3 || C === 8 || C === 10) {
                            if (!isOverBudget) { // 如果不是超预算行，设置灰色
                                cellStyle.font.color = { rgb: "86868B" };
                            }
                        }

                        // 备注列允许换行
                        if (C === 10) {
                            cellStyle.alignment.wrapText = true;
                        }

                        ws[cellRef].s = cellStyle;
                    }
                }
            }

            // 设置列宽
            ws['!cols'] = [
                { wpx: 140 }, // 名称
                { wpx: 80 },  // 分类
                { wpx: 120 }, // 品牌
                { wpx: 60 },  // 数量
                { wpx: 110 }, // 预算
                { wpx: 110 }, // 实际
                { wpx: 120 }, // 渠道
                { wpx: 80 },  // 状态
                { wpx: 250 }  // 备注
            ];

            // 导出文件
            XLSX.utils.book_append_sheet(wb, ws, "预算清单");
            
            // 格式化日期：YYYY-MM-DD
            const d = new Date();
            const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            XLSX.writeFile(wb, `装修预算 ${dateStr}.xlsx`);
        }

        // --- 初始化启动 ---
        window.onload = init;
    </script>
</body>
</html>
